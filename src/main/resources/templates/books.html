<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>도서 목록</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
	<header class="pb-3 mb-4 border-bottom">
		<div class="container d-flex flex-wrap justify-content-center">
			<a th:href="@{/home}" class="d-flex align-items-center text-body-emphasis text-decoration-none mb-3 mb-lg-0 me-lg-auto">
				<img th:src="@{/imgs/book_icon.png}" width="30" height="30">&nbsp;&nbsp;
				<span class="fs-4">BookMarket</span>
			</a>
			<ul class="nav">
				<li><a th:href="@{/books/IT전문서}" class="nav-link">IT전문서</a></li>
				<li><a th:href="@{/books/소설/시/희곡}" class="nav-link">소설/시/희곡</a></li>
			</ul>
		</div>
	</header>

	<div class="p-5 mb-4 bg-body-tertiary rounded-3">
		<div class="container-fluid py-5">
			<h1 class="display-5 fw-bold">도서 목록</h1>
			<p class="col-md-8 fs-4">BookMarket</p>
		</div>
	</div>

	<div class="row align-items-md-stretch text-center">
		<div class="col-md-4" th:each="book : ${bookList}">
			<h3 th:text="${book.name}"></h3>
			<p th:text="${book.author}"></p>
			<p th:text="${book.publisher} + ' | ' + ${book.releaseDate}"></p>
			<p align="left" th:text="${book.description}"></p>
			<p><b th:text="${book.unitPrice} + '원'"></b></p>
			<p>
				<a th:href="@{/books/book(id=${book.bookId})}" class="btn btn-secondary" role="button">상세정보 &raquo;</a>
			</p>
		</div>
	</div>

	<footer class="pt-3 mt-4 text-body-secondary border-top">
		<span class="text-body-secondary">&copy; BookMarket</span>
	</footer>
</div>
</body>
</html>
